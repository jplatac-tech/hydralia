<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Hydralia — Calendario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/hydralia.css" rel="stylesheet">
</head>
<body data-page="calendario">
  <div id="hydralia-topnav"></div>
  <div class="container py-4">
    <div class="app-layout">
      <aside class="app-sidebar"><nav class="nav flex-column" id="hydralia-sidebar"></nav></aside>
      <main class="app-main">
        <h2 class="mb-1">Calendario interactivo</h2>
        <p class="text-muted mb-4">Días de riego, fertilización, poda y eventos importantes.</p>
        <div class="row">
          <div class="col-lg-8 mb-4">
            <div class="card hydralia-card p-4">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <button id="cal-prev" class="btn btn-sm btn-outline-secondary">←</button>
                <h5 id="calendar-title" class="mb-0 text-capitalize"></h5>
                <button id="cal-next" class="btn btn-sm btn-outline-secondary">→</button>
              </div>
              <div id="calendar-grid" class="calendar-grid"></div>
              <div class="calendar-legend mt-3">
                <span><span class="calendar-dot dot-riego"></span> Riego</span>
                <span><span class="calendar-dot dot-fertil"></span> Fertilización</span>
                <span><span class="calendar-dot dot-poda"></span> Poda</span>
                <span><span class="calendar-dot dot-evento"></span> Evento</span>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card hydralia-card p-4">
              <h5>Próximos eventos</h5>
              <div id="calendar-events-list"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

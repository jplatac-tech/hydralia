<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Hydralia — Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/hydralia.css" rel="stylesheet">
</head>
<body data-page="dashboard">
  <div id="hydralia-topnav"></div>
  <div class="container py-4">
    <div class="app-layout">
      <aside class="app-sidebar"><nav class="nav flex-column" id="hydralia-sidebar"></nav></aside>
      <main class="app-main">
        <h2 class="mb-4">Panel principal</h2>
        <div class="row mb-4 dashboard-stats-row">
          <div class="col-md-3 mb-3"><div class="insight-card insight-card--plants"><span class="insight-icon">🌱</span><div><div class="insight-value" id="stat-plants">0</div><div class="insight-label">Plantas</div></div></div></div>
          <div class="col-md-3 mb-3"><div class="insight-card insight-card--water"><span class="insight-icon">💧</span><div><div class="insight-value" id="stat-water-today">0</div><div class="insight-label">Agua hoy</div></div></div></div>
          <div class="col-md-3 mb-3"><div class="insight-card insight-card--sun"><span class="insight-icon">☀️</span><div><div class="insight-value" id="stat-needs-light">0</div><div class="insight-label">Más luz</div></div></div></div>
          <div class="col-md-3 mb-3"><div class="insight-card insight-card--health"><span class="insight-icon">🟢</span><div><div class="insight-value" id="stat-avg-health">0%</div><div class="insight-label">Salud media</div></div></div></div>
        </div>
        <div class="row">
          <div class="col-lg-6 mb-4">
            <div class="card hydralia-card card-section card-section--health p-3">
              <h6>Hidratación / Salud por planta</h6>
              <div class="chart-wrap">
                <canvas id="chartHydration"></canvas>
              </div>
            </div>
          </div>
          <div class="col-lg-6 mb-4">
            <div class="card hydralia-card card-section card-section--water p-3">
              <h6>💧 Frecuencia de riego (4 semanas)</h6>
              <div class="chart-wrap">
                <canvas id="chartRiegos"></canvas>
              </div>
            </div>
          </div>
          <div class="col-lg-6 mb-4">
            <div class="card hydralia-card card-section card-section--health p-3">
              <h6>🌱 Gráfica de crecimiento</h6>
              <div class="chart-wrap">
                <canvas id="chartGrowth"></canvas>
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-lg-6 mb-4">
            <div class="card hydralia-card card-section card-section--gold p-3">
              <h5 class="mb-3">🏆 Logros</h5>
              <div id="achievements-preview"></div>
              <a href="logros.html" class="btn btn-sm btn-outline-primary mt-2">Ver todos</a>
            </div>
          </div>
          <div class="col-lg-6 mb-4">
            <div class="card hydralia-card card-section card-section--water p-3">
              <h5 class="mb-3">🔔 Recordatorios</h5>
              <div id="reminders-preview"></div>
              <a href="recordatorios.html" class="btn btn-sm btn-outline-primary mt-2">Ver todos</a>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div id="modals-container"></div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script>$("#modals-container").load("partials/modals.html");</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Hydralia — Historial de riego</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/hydralia.css" rel="stylesheet">
</head>
<body data-page="riego">
  <div id="hydralia-topnav"></div>
  <div class="container py-4">
    <div class="app-layout">
      <aside class="app-sidebar"><nav class="nav flex-column" id="hydralia-sidebar"></nav></aside>
      <main class="app-main">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
          <div>
            <h2 class="mb-1">Historial de riego</h2>
            <p class="text-muted mb-0">Registra riegos, consulta frecuencia y alertas.</p>
          </div>
          <button class="btn btn-primary" data-toggle="modal" data-target="#modalAddRiego">+ Registrar riego</button>
        </div>
        <div id="riego-alerts" class="mb-3"></div>
        <div class="card hydralia-card p-3 mb-4">
          <h6>Calendario de riegos recientes</h6>
          <p class="text-muted small mb-0">La plataforma calcula la frecuencia promedio según tus registros.</p>
        </div>
        <div id="riego-history"></div>
      </main>
    </div>
  </div>
  <div id="modals-container"></div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script>$("#modals-container").load("partials/modals.html");</script>
</body>
</html>

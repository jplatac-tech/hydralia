<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Hydralia — Iniciar sesión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/hydralia.css" rel="stylesheet">
</head>
<body class="auth-page" data-page="login">
  <div class="auth-page-wrap">
    <div class="auth-topbar">
      <a href="login.html" class="auth-logo-link">
        <img src="img/hydralia-logo-nav.png?v=5" alt="Hydralia" class="auth-logo" />
      </a>
      <button type="button" id="btnToggleDark" class="btn btn-sm btn-outline-secondary navbar-dark-btn" title="Modo oscuro" aria-label="Cambiar modo oscuro">🌙</button>
    </div>

    <div class="auth-card hydralia-card">
      <h1 class="auth-title">Iniciar sesión</h1>
      <p class="auth-subtitle text-muted">Accede a tu jardín Hydralia</p>

      <div class="auth-demo-notice">
        <strong>Modo demostración</strong>
        <p class="mb-0 small">Las cuentas se guardan solo en este navegador. No hay servidor ni datos reales en la nube.</p>
      </div>

      <div id="auth-error" class="alert alert-danger d-none" role="alert"></div>

      <form id="form-login" novalidate>
        <div class="form-group">
          <label for="login-email">Correo electrónico</label>
          <input type="email" class="form-control" id="login-email" placeholder="tu@correo.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" class="form-control" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block auth-submit">Entrar</button>
      </form>

      <div class="auth-demo-credentials">
        <p class="small text-muted mb-1">Cuenta de prueba:</p>
        <p class="small mb-0"><code>demo@hydralia.app</code> · contraseña <code>demo123</code></p>
      </div>

      <p class="auth-switch mb-0">
        ¿No tienes cuenta?
        <a href="registro.html">Crear cuenta</a>
      </p>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
